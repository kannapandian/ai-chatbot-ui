<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  padding: 15px 20px;
  border-bottom: 1px solid #1e293b;
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* CHAT */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

/* MESSAGE ROW */
.message-row {
  display: flex;
  align-items: flex-start;
  margin-bottom: 15px;
  gap: 10px;
}

/* AVATAR */
.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bot-avatar {
  background: #1e293b;
}

.user-avatar {
  background: #0ea5e9;
}

/* MESSAGE */
.message {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.5;
  font-size: 15px;
}

/* BOT */
.bot {
  background: #020617;
  border: 1px solid #1e293b;
}

/* USER */
.user {
  background: #0ea5e9;
  color: white;
  margin-left: auto;
}

/* INPUT */
.input-container {
  padding: 15px;
  border-top: 1px solid #1e293b;
  background: rgba(2, 6, 23, 0.95);
}

.input-box {
  display: flex;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 8px;
  gap: 10px;
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  outline: none;
  padding: 10px;
}

button {
  background: #0ea5e9;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0284c7;
}

/* LOADING ANIMATION */
.loading {
  display: flex;
  gap: 5px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #38bdf8;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0; }
  40% { opacity: 1; }
}
</style>

</head>

<body>

<div class="header">
  🤖 AI Assistant
</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-container">
  <div class="input-box">
    <input id="userInput" placeholder="Ask anything..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API_URL = "https://xidyynlbq5.execute-api.us-east-1.amazonaws.com/chat";

function addMessage(content, sender, isLoading=false) {
  const chat = document.getElementById("chatContainer");

  const row = document.createElement("div");
  row.classList.add("message-row");

  const avatar = document.createElement("div");
  avatar.classList.add("avatar", sender === "bot" ? "bot-avatar" : "user-avatar");
  avatar.innerText = sender === "bot" ? "🤖" : "👤";

  const msg = document.createElement("div");
  msg.classList.add("message", sender);

  if (isLoading) {
    msg.innerHTML = `
      <div class="loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
  } else {
    msg.innerText = content;
  }

  if (sender === "user") {
    row.style.justifyContent = "flex-end";
    row.appendChild(msg);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(msg);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;

  return msg;
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const loadingMsg = addMessage("", "bot", true);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    console.log("API response:", data);

    if (data.reply) {
      loadingMsg.innerText = data.reply;
    } else if (data.error) {
      loadingMsg.innerText = "⚠️ " + data.error;
    } else {
      loadingMsg.innerText = "⚠️ Unexpected response";
    }

  } catch (e) {
    loadingMsg.innerText = "⚠️ Connection failed";
  }
}

document.getElementById("userInput").addEventListener("keypress", function(e){
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
