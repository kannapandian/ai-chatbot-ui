<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  padding: 15px 20px;
  border-bottom: 1px solid #1e293b;
  font-size: 18px;
  font-weight: bold;
  color: #38bdf8;
  backdrop-filter: blur(10px);
}

/* CHAT */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 25px;
}

/* MESSAGE ROW */
.message-row {
  display: flex;
  margin-bottom: 18px;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* AVATAR */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
}

.bot-avatar { background: #1e293b; }
.user-avatar { background: #0ea5e9; }

/* MESSAGE */
.message {
  max-width: 65%;
  padding: 14px 18px;
  border-radius: 14px;
  line-height: 1.5;
  backdrop-filter: blur(6px);
}

/* BOT */
.bot {
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid #1e293b;
}

/* USER */
.user {
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  color: white;
  margin-left: auto;
}

/* INPUT AREA */
.input-container {
  padding: 15px;
  border-top: 1px solid #1e293b;
  background: rgba(2, 6, 23, 0.9);
  backdrop-filter: blur(10px);
}

.input-box {
  display: flex;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 8px;
  box-shadow: 0 0 10px rgba(14,165,233,0.2);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  font-size: 16px;
  padding: 10px;
  outline: none;
}

/* BUTTON */
button {
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* TYPING DOTS */
.typing {
  display: flex;
  gap: 5px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #38bdf8;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2){ animation-delay: 0.2s;}
.dot:nth-child(3){ animation-delay: 0.4s;}

@keyframes blink {
  0%,80%,100%{opacity:0;}
  40%{opacity:1;}
}
</style>

</head>

<body>

<div class="header">🤖 AI Assistant Pro</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-container">
  <div class="input-box">
    <input id="userInput" placeholder="Ask anything..." />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API_URL = "https://xidyynlbq5.execute-api.us-east-1.amazonaws.com/chat";

function addMessage(content, sender, loading=false) {
  const chat = document.getElementById("chatContainer");

  const row = document.createElement("div");
  row.classList.add("message-row");

  const avatar = document.createElement("div");
  avatar.classList.add("avatar", sender==="bot"?"bot-avatar":"user-avatar");
  avatar.innerText = sender==="bot"?"🤖":"👤";

  const msg = document.createElement("div");
  msg.classList.add("message", sender);

  if (loading) {
    msg.innerHTML = `
      <div class="typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
  } else {
    msg.innerText = content;
  }

  if (sender === "user") {
    row.style.justifyContent = "flex-end";
    row.appendChild(msg);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(msg);
  }

  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;

  return msg;
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const loadingMsg = addMessage("", "bot", true);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message})
    });

    const data = await res.json();
    console.log(data);

    if (data.reply) {
      loadingMsg.innerText = data.reply;
    } else {
      loadingMsg.innerText = "⚠️ Error";
    }

  } catch {
    loadingMsg.innerText = "⚠️ Connection failed";
  }
}

document.getElementById("userInput").addEventListener("keypress", e=>{
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
